[pytest]
# Pytest configuration for Telegram DNS Bot test suite

# Set asyncio mode to auto for pytest-asyncio
asyncio_mode = auto

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests (tests/test_services.py)
    integration: marks tests as integration tests (tests/test_handlers.py)
    white_box: marks tests as white box tests (service layer)
    gray_box: marks tests as gray box tests (handler layer)
    slow: marks tests as slow (deselect with '-m "not slow"')
    database: marks tests that use database fixtures
    api: marks tests that mock external APIs

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Coverage options (if running with --cov)
[coverage:run]
source = app,bot
omit = 
    */migrations/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
